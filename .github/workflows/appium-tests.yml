name: Appium E2E Mobile Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  appium-tests:
    runs-on: macos-latest # macOS runners support hardware acceleration for Android Emulators
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './appium_tests/package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android APK
        run: |
          flutter pub get
          flutter build apk --debug

      - name: Install Appium and UIAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Install Test Dependencies
        working-directory: ./appium_tests
        run: npm install

      - name: Run Appium Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          script: |
            # Start Appium Server in the background
            appium &
            # Wait for Appium to start
            sleep 10
            # Run the tests
            cd appium_tests && npm run test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-test-report
          path: appium_tests/mobile_test_report.xlsx
