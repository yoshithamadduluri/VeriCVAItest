name: Selenium E2E Web Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  selenium-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './selenium_tests/package-lock.json'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Dependencies
        working-directory: ./selenium_tests
        run: npm install

      # Note: If your web app needs to be built and served locally before the test runs, 
      # you would add a step here to start a local server (e.g., flutter run -d web-server)
      
      - name: Run Selenium Tests
        working-directory: ./selenium_tests
        run: npm run test

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-report
          path: selenium_tests/web_test_report.xlsx
