name: VeriCV AI CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  selenium-tests:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Install Node Dependencies
        working-directory: ./selenium_tests
        run: npm install

      - name: Restore Firebase Config Files
        run: |
          # Create .env
          echo "R0VNSU5JX0FQSV9LRVk9QVEuQWI4Uk42S0JzMFBWempfeTlyeUZSczEwbzBHeER5Z2dqcVdhamdqQ3lJY1FPOVI3VncK" | base64 -d > .env
          
          # Create lib/firebase_options.dart
          echo -n "" | base64 -d > lib/firebase_options.dart
          
          # Create android/app/google-services.json
          echo -n "" | base64 -d > android/app/google-services.json
          
          echo "✅ Config files decoded and restored."

      - name: Build Flutter Web
        run: |
          flutter pub get
          flutter build web --release --base-href "/VeriCVAItest/"

      - name: Serve and Run Selenium Tests
        run: |
          python3 -m http.server 8080 --directory build/web &
          sleep 3
          cd selenium_tests && npm run test

      - name: Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Upload Selenium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: selenium_tests/web_test_report.xlsx
          
      - name: Upload Selenium Visual Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-visual-screenshots
          path: selenium_tests/web_visual_screenshots/

  appium-python-tests:
    name: Appium Mobile Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        working-directory: ./appium_tests_python
        run: pip install -r requirements.txt

      - name: Run Python Appium Tests
        working-directory: ./appium_tests_python
        run: python test_appium.py

      - name: Upload Appium Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-python-report
          path: appium_tests_python/mobile_appium_test_report.xlsx
          
      - name: Upload Mobile Visual Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-visual-screenshots
          path: appium_tests_python/mobile_visual_screenshots/

  deploy-gh-pages:
    name: Deploy to GitHub Pages
    needs: [selenium-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Download Web Build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: build/web

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web

  generate-report:
    name: Generate VeriCV Master Test Report
    needs: [selenium-tests, appium-python-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Selenium Report
        uses: actions/download-artifact@v4
        with:
          name: selenium-report
          path: reports
        continue-on-error: true

      - name: Download Appium Python Report
        uses: actions/download-artifact@v4
        with:
          name: appium-python-report
          path: reports
        continue-on-error: true

      - name: Upload Master VeriCV Report
        uses: actions/upload-artifact@v4
        with:
          name: VeriCV_Master_Report
          path: reports/
