name: Flutter CI/CD and Web Deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Setup Chrome for Integration Testing
        uses: browser-actions/setup-chrome@latest

      - name: Run E2E Integration Tests (Headless Web)
        run: flutter test --platform chrome integration_test/app_test.dart

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/VeriCVAItest/"

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
